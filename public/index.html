<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 洞察 · 用户小镇</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Insights Town</p>
          <h1>巴基斯坦手机用户小镇</h1>
        </div>
        <span id="healthBadge" class="status-pill">加载中</span>
      </header>
      <main class="workspace">
        <section class="panel overview-panel">
          <div class="section-head"><div><p class="eyebrow">Overview</p><h2>全镇概况</h2></div><button id="refreshBtn" class="icon-button" type="button">↻</button></div>
          <div id="overviewGrid" class="metric-grid"></div>
          <div id="overviewInsights" class="insight-grid"></div>
        </section>
        <section class="panel chat-panel">
          <div class="section-head">
            <div><p class="eyebrow">Town Brain</p><h2>和用户小镇对话</h2></div>
            <div class="segmented"><button class="segment active" data-mode="single" type="button">单聊</button><button class="segment" data-mode="town" type="button">群聊</button></div>
          </div>
          <div class="chat-controls"><label class="field"><span>居民</span><select id="residentSelect"></select></label><label class="field"><span>输出语言</span><select id="languageSelect"><option value="zh">中文</option><option value="en">English</option></select></label></div>
          <label class="field question-field"><span>问题</span><textarea id="questionInput" rows="4" placeholder="例如：如果 HOT 70 Pro 涨价 5000 PKR，哪些人还会买？为什么？"></textarea></label>
          <div class="button-row"><button id="askBtn" class="primary-button" type="button">提问</button><button id="sampleBtn" class="ghost-button" type="button">示例问题</button></div>
          <div id="answerArea" class="answer-area"><p class="empty-state">选择单个居民或全镇群聊，然后输入问题。</p></div>
        </section>
        <section class="panel residents-panel"><div class="section-head"><div><p class="eyebrow">Residents</p><h2>居民列表</h2></div><span id="residentCount" class="status-pill">0 位</span></div><div id="residentList" class="resident-list"></div></section>
      </main>
    </div>
    <dialog id="residentDialog" class="modal wide-modal"><div class="modal-body"><div class="section-head"><div><p class="eyebrow">Resident Detail</p><h2 id="detailName">居民详情</h2></div><button id="closeDetailBtn" class="icon-button" type="button">×</button></div><div id="residentDetail" class="detail-grid"></div></div></dialog>
    <script src="/app.js" type="module"></script>
  </body>
</html>
